<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Daniel Sampaio | Data & Commercial Analytics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-main: #0b0f1a;
      --bg-deep: #121a2a;
      --bg-mid: #1f2a44;
      --accent: #8faedb;
      --text-main: #eaeff7;
      --dots: #2f4e7a;
      --line-overlay-strong: rgba(255, 255, 255, 0.2);
      --line-overlay-soft: rgba(255, 255, 255, 0.12);
      --card-line: rgba(143, 174, 219, 0.3);
      --text-soft: rgba(234, 239, 247, 0.76);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Manrope", "Segoe UI", sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at 18% 8%, rgba(143, 174, 219, 0.18) 0, transparent 30%),
        linear-gradient(160deg, var(--bg-main) 0%, var(--bg-deep) 62%, #101725 100%);
      min-height: 100vh;
      padding: 24px 16px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .profile {
      width: min(100%, 720px);
      background: linear-gradient(180deg, #111a2b 0%, #0f1727 100%);
      border: 1px solid var(--card-line);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 16px 38px rgba(0, 0, 0, 0.42);
      animation: rise 0.8s ease-out;
    }

    .social-icons {
      position: absolute;
      top: 12px;
      left: 14px;
      display: flex;
      gap: 8px;
      z-index: 2;
    }

    .social-icons a {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.22);
      border: 1px solid rgba(255, 255, 255, 0.35);
      display: grid;
      place-content: center;
      transition: background 0.2s ease, transform 0.2s ease;
      backdrop-filter: blur(6px);
    }

    .social-icons a:hover {
      background: rgba(255, 255, 255, 0.38);
      transform: scale(1.08);
    }

    .social-icons svg {
      width: 18px;
      height: 18px;
      fill: #ffffff;
    }

    .cover {
      height: 200px;
      background:
        linear-gradient(180deg, transparent 60%, #111a2b 100%),
        url('banner%20site.png') center / cover no-repeat;
      position: relative;
      overflow: hidden;
    }

    .cover::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(47, 78, 122, 0.42) 1px, transparent 1.5px);
      background-size: 12px 12px;
      opacity: 0.3;
      mask-image: linear-gradient(90deg, transparent 50%, black 100%);
      pointer-events: none;
    }

    .cover::after {
      content: "";
      position: absolute;
      right: -48px;
      top: -90px;
      width: 360px;
      height: 300px;
      border-radius: 50%;
      border: 1px solid var(--line-overlay-strong);
      box-shadow:
        0 0 0 24px var(--line-overlay-soft),
        0 0 0 50px rgba(255, 255, 255, 0.1);
      pointer-events: none;
    }

    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 3px solid #111a2b;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
      object-fit: cover;
      display: block;
      margin: -60px auto 0;
      position: relative;
      z-index: 1;
    }

    .content {
      padding: 12px 28px 28px;
      text-align: center;
    }

    .eyebrow {
      margin: 0;
      color: var(--accent);
      font-weight: 700;
      letter-spacing: 0.08em;
      font-size: 12px;
      text-transform: uppercase;
    }

    h1 {
      font-family: "Space Grotesk", "Manrope", sans-serif;
      margin: 10px 0 0;
      font-size: clamp(30px, 4vw, 40px);
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: var(--text-main);
    }

    .lang-prompt {
      margin: 18px auto 0;
      display: flex;
      justify-content: center;
      gap: 6px 20px;
      flex-wrap: wrap;
    }

    .lang-prompt span {
      font-size: 14px;
      color: var(--text-soft);
      letter-spacing: 0.01em;
      position: relative;
    }

    .lang-prompt span:not(:last-child)::after {
      content: "/";
      margin-left: 20px;
      color: rgba(143, 174, 219, 0.35);
    }

    .links {
      margin-top: 30px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      text-decoration: none;
      border-radius: 12px;
      padding: 14px 18px;
      font-weight: 700;
      font-size: 16px;
      transition: transform 0.2s ease, background-color 0.2s ease;
      border: 1px solid;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-width: 180px;
    }

    .flag-img {
      width: 22px;
      height: 16px;
      border-radius: 2px;
      object-fit: cover;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.08);
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      background: linear-gradient(180deg, #97b6e3 0%, #7f9fcc 100%);
      color: #0d1524;
      border: 1px solid #9bb9e5;
    }

    .btn-primary:hover {
      background: linear-gradient(180deg, #a3c2ed 0%, #8aa9d6 100%);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-main);
      border-color: rgba(143, 174, 219, 0.42);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .hint {
      margin-top: 16px;
      font-size: 13px;
      color: rgba(234, 239, 247, 0.6);
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 860px) {
      .content {
        padding: 24px 18px;
      }

      .cover {
        height: 150px;
      }

      .btn {
        width: 100%;
      }
    }

  </style>
</head>
